<svg width="900" height="200" viewBox="0 0 900 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="200" rx="20" fill="#5B3FD9"/>
  <!-- Subtle gradient overlay -->
  <rect width="900" height="200" rx="20" fill="url(#bggrad)" opacity="0.25"/>
  <!-- Decorative circles background -->
  <circle cx="820" cy="30" r="90" fill="white" opacity="0.04"/>
  <circle cx="780" cy="180" r="60" fill="white" opacity="0.04"/>
  <circle cx="60" cy="170" r="70" fill="white" opacity="0.04"/>

  <!-- Logo box -->
  <rect x="48" y="60" width="80" height="80" rx="20" fill="white" opacity="0.15"/>
  <!-- Logo arrow line -->
  <path d="M68 100h32" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Logo arrow chevron -->
  <path d="M92 88l12 12-12 12" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Logo right node -->
  <circle cx="112" cy="100" r="8" fill="white"/>
  <!-- Logo left node -->
  <circle cx="68" cy="100" r="5.5" fill="white" opacity="0.45"/>

  <!-- Wordmark: Relay Pay -->
  <text x="154" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">Relay Pay</text>

  <!-- Tagline -->
  <text x="154" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="white" opacity="0.7" letter-spacing="0.2">A product feature concept for UPI payment delegation</text>

  <!-- Right side pill badge -->
  <rect x="696" y="78" width="168" height="34" rx="17" fill="white" opacity="0.15"/>
  <text x="780" y="101" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle" letter-spacing="0.3">CONCEPT PROTOTYPE</text>

  <defs>
    <linearGradient id="bggrad" x1="0" y1="0" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#3c2faa"/>
    </linearGradient>
  </defs>
</svg>
